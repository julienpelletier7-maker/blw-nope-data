name: Collect NOPE
on:
  schedule:
    - cron: "50 19 * * 1-5"
    - cron: "50 20 * * 1-5"
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install yfinance
      - name: Run collector
        run: python nope_collector.py
      - name: Commit data
        run: |
          git config user.name  "nope-bot"
          git config user.email "nope-bot@users.noreply.github.com"
          git add data/*.csv
          git diff --cached --quiet || git commit -m "NOPE $(date -u +%F)"
          git push
